version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: legal_assistant_db
    environment:
      POSTGRES_USER: legaluser
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: legal_assistant_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legaluser -d legal_assistant_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - legal-network

  scraper:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eproc_scraper
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://legaluser:securepassword@postgres:5432/legal_assistant_db
      EPROC_BASE_URL: https://eproc.tjsp.jus.br
      AUTH_METHOD: username
      EPROC_USERNAME: ${EPROC_USERNAME:-test_user}
      EPROC_PASSWORD: ${EPROC_PASSWORD:-test_pass}
      HEADLESS_MODE: "true"
      LOG_LEVEL: INFO
      LOG_FILE: /app/logs/scraper.log
    volumes:
      - ./logs:/app/logs
      - ./.playwright_session:/app/.playwright_session
    networks:
      - legal-network
    command: python scraper_run.py

volumes:
  postgres_data:
    driver: local

networks:
  legal-network:
    driver: bridge
