<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Processo - Detalhes</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
  body { background: #F4EFE6; color: #3A3530; }

  .app { display: flex; min-height: 100vh; }

  /* ====== SIDEBAR (mesmo da home) ====== */
  .sidebar {
    width: 240px; background: #6B5B4D;
    display: flex; flex-direction: column;
    padding: 16px 12px; gap: 2px; flex-shrink: 0;
    transition: width .2s ease;
  }
  .sidebar.collapsed { width: 76px; align-items: center; padding: 16px 8px; }

  .sidebar-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 8px; margin-bottom: 18px;
  }
  .sidebar.collapsed .sidebar-header { justify-content: center; padding: 4px 0; }
  .sidebar-header .brand { font-size: 15px; font-weight: 500; color: #F4EFE6; white-space: nowrap; }
  .sidebar.collapsed .sidebar-header .brand { display: none; }
  .sidebar-header .toggle-icon {
    font-size: 18px; color: #B4A89A; cursor: pointer; flex-shrink: 0;
    padding: 4px; border-radius: 6px; transition: background .15s, color .15s;
  }
  .sidebar-header .toggle-icon:hover { background: #5C4D40; color: #FFFFFF; }

  .workspace-pill {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px;
    border: 0.5px solid #7F6E5F; margin-bottom: 16px;
    cursor: pointer; transition: background .15s;
    white-space: nowrap; overflow: hidden;
  }
  .sidebar.collapsed .workspace-pill { padding: 8px; justify-content: center; border: none; margin-bottom: 14px; }
  .workspace-pill:hover { background: #5C4D40; }
  .workspace-pill .ws-icon {
    width: 24px; height: 24px; border-radius: 6px; background: #D4622A;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .workspace-pill .ws-icon i { font-size: 14px; color: #FAEEDA; }
  .workspace-pill .ws-name { font-size: 14px; font-weight: 500; color: #F4EFE6; flex: 1; }
  .workspace-pill .ws-chevron { font-size: 14px; color: #B4A89A; }
  .sidebar.collapsed .workspace-pill .ws-name,
  .sidebar.collapsed .workspace-pill .ws-chevron { display: none; }

  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 10px; border-radius: 8px;
    color: #D8CFC2; cursor: pointer;
    transition: background .15s, color .15s;
    white-space: nowrap; overflow: hidden; font-size: 14px;
  }
  .sidebar.collapsed .nav-item { padding: 10px; justify-content: center; }
  .nav-item i { font-size: 19px; flex-shrink: 0; color: #B4A89A; }
  .sidebar.collapsed .nav-item span { display: none; }
  .nav-item:hover { background: #5C4D40; color: #FFFFFF; }
  .nav-item.active { background: #5C4D40; color: #F4EFE6; font-weight: 500; }
  .nav-item.active i { color: #D4622A; }

  .nav-spacer { flex: 1; }

  .sidebar-footer {
    border-top: 0.5px solid #7F6E5F;
    padding-top: 8px; margin-top: 8px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .sidebar.collapsed .sidebar-footer { width: 100%; align-items: center; }
  .footer-link {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px;
    color: #B4A89A; font-size: 13px; cursor: pointer;
    white-space: nowrap; overflow: hidden; transition: background .15s;
  }
  .sidebar.collapsed .footer-link { padding: 8px; justify-content: center; }
  .footer-link i:first-child { font-size: 17px; flex-shrink: 0; }
  .footer-link:hover { background: #5C4D40; color: #D8CFC2; }
  .sidebar.collapsed .footer-link span:not(:first-child) { display: none; }

  .user-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px; border-radius: 8px;
    cursor: pointer; transition: background .15s;
    white-space: nowrap; overflow: hidden; margin-top: 4px;
  }
  .sidebar.collapsed .user-row { justify-content: center; }
  .user-row:hover { background: #5C4D40; }
  .user-row .avatar {
    width: 28px; height: 28px; border-radius: 50%; background: #D4622A;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    font-size: 12px; font-weight: 500; color: #FAEEDA;
  }
  .user-row .user-info { flex: 1; overflow: hidden; }
  .user-row .user-name { font-size: 13px; font-weight: 500; color: #F4EFE6; }
  .user-row .user-role { font-size: 12px; color: #B4A89A; }
  .user-row .user-chevron { font-size: 14px; color: #B4A89A; flex-shrink: 0; }
  .sidebar.collapsed .user-row .user-info,
  .sidebar.collapsed .user-row .user-chevron { display: none; }

  /* ====== CONTEÚDO PRINCIPAL ====== */
  .main {
    flex: 1; padding: 24px 28px;
    display: flex; flex-direction: column; gap: 20px;
    max-width: 900px;
  }

  /* Breadcrumb / voltar */
  .page-header {
    display: flex; align-items: center; gap: 12px;
  }
  .back-btn {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: #8A8276; cursor: pointer;
    padding: 6px 10px; border-radius: 8px;
    transition: background .15s, color .15s;
  }
  .back-btn:hover { background: #E2D9CC; color: #3A3530; }
  .back-btn i { font-size: 16px; }

  .page-title { font-size: 20px; font-weight: 500; }
  .page-subtitle { font-size: 13px; color: #8A8276; margin-top: 2px; }

  /* Card de tarefa pendente */
  .tarefa-card {
    background: #6B5B4D;
    border-radius: 12px;
    padding: 20px 24px;
    color: #F4EFE6;
    display: flex;
    gap: 20px;
    align-items: stretch;
  }

  .tarefa-prazos {
    display: flex; flex-direction: column; gap: 8px;
    flex-shrink: 0;
  }
  .prazo-pill {
    display: flex; align-items: center; gap: 8px;
    background: #5C4D40;
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 13px;
  }
  .prazo-pill i { font-size: 15px; color: #D4622A; }
  .prazo-label { color: #B4A89A; }
  .prazo-date { color: #F4EFE6; font-weight: 500; }

  .tarefa-center {
    flex: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    text-align: center;
  }
  .tarefa-titulo {
    font-size: 15px; font-weight: 500; color: #FAEEDA;
  }
  .tarefa-desc { font-size: 13px; color: #B4A89A; }

  .btn-escrever {
    display: inline-flex; align-items: center; gap: 8px;
    background: #D4622A; color: #FAEEDA;
    border: none; border-radius: 8px;
    padding: 10px 20px; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: background .15s;
  }
  .btn-escrever:hover { background: #B8521F; }
  .btn-escrever i { font-size: 16px; }

  .tarefa-acoes {
    display: flex; flex-direction: column; gap: 8px;
    flex-shrink: 0; justify-content: center;
  }
  .btn-acao {
    width: 40px; height: 40px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    border: none; cursor: pointer; font-size: 18px;
    transition: background .15s;
  }
  .btn-sim {
    background: #6B7F4F; color: #FAEEDA;
  }
  .btn-sim:hover { background: #5A6D42; }
  .btn-nao {
    background: #5C4D40; color: #B4A89A;
  }
  .btn-nao:hover { background: #4A3E34; color: #F4EFE6; }

  /* Timeline de eventos */
  .timeline-section h3 {
    font-size: 16px; font-weight: 500; margin-bottom: 16px;
  }

  .timeline {
    display: flex; flex-direction: column; gap: 0;
    position: relative;
    padding-left: 24px;
  }
  .timeline::before {
    content: '';
    position: absolute;
    left: 7px; top: 8px; bottom: 8px;
    width: 2px;
    background: #E2D9CC;
    border-radius: 1px;
  }

  .timeline-item {
    position: relative;
    background: #FFFFFF;
    border: 0.5px solid #E2D9CC;
    border-radius: 12px;
    padding: 16px 20px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: border-color .15s;
  }
  .timeline-item:hover { border-color: #D4622A; }

  .timeline-item::before {
    content: '';
    position: absolute;
    left: -21px; top: 20px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #D4622A;
    border: 2px solid #F4EFE6;
  }
  .timeline-item.old::before {
    background: #E2D9CC;
  }

  .evento-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
  }
  .evento-tipo { font-size: 14px; font-weight: 500; }
  .evento-data { font-size: 12px; color: #8A8276; }
  .evento-desc { font-size: 13px; color: #8A8276; line-height: 1.5; }

  .timeline-more {
    position: relative;
    text-align: center;
    padding: 12px;
    font-size: 13px; color: #8A8276;
    cursor: pointer;
    border-radius: 8px;
    transition: background .15s;
  }
  .timeline-more:hover { background: #E2D9CC; }
  .timeline-more::before {
    content: '';
    position: absolute;
    left: -21px; top: 18px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #E2D9CC;
    border: 2px solid #F4EFE6;
  }
</style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="brand">jurisapp</span>
      <i class="ti ti-layout-sidebar-left-collapse toggle-icon" id="sidebar-toggle"></i>
    </div>
    <div class="workspace-pill">
      <div class="ws-icon"><i class="ti ti-scale"></i></div>
      <span class="ws-name">escritório fulano</span>
      <i class="ti ti-chevron-down ws-chevron"></i>
    </div>
    <div class="nav-item"><i class="ti ti-home"></i><span>início</span></div>
    <div class="nav-item active"><i class="ti ti-files"></i><span>processos</span></div>
    <div class="nav-item"><i class="ti ti-calendar"></i><span>calendário</span></div>
    <div class="nav-spacer"></div>
    <div class="sidebar-footer">
      <div class="nav-item"><i class="ti ti-settings"></i><span>configurações</span></div>
      <div class="footer-link"><i class="ti ti-help"></i><span>ajuda</span></div>
      <div class="user-row">
        <div class="avatar">DF</div>
        <div class="user-info">
          <div class="user-name">dr. fulano</div>
          <div class="user-role">admin · escritório fulano</div>
        </div>
        <i class="ti ti-chevron-down user-chevron"></i>
      </div>
    </div>
  </div>

  <!-- Conteúdo principal -->
  <div class="main">

    <!-- Header da página -->
    <div>
      <div class="page-header">
        <div class="back-btn" onclick="window.location.href='home.html'">
          <i class="ti ti-arrow-left"></i> voltar
        </div>
      </div>
      <h2 class="page-title" id="proc-titulo"></h2>
      <p class="page-subtitle" id="proc-subtitulo"></p>
    </div>

    <!-- Card de tarefa pendente -->
    <div class="tarefa-card" id="tarefa-card"></div>

    <!-- Timeline de eventos -->
    <div class="timeline-section">
      <h3>eventos do processo</h3>
      <div class="timeline" id="timeline"></div>
    </div>

  </div>
</div>

<script>
// Sidebar toggle
const sidebar = document.getElementById("sidebar");
const sidebarToggle = document.getElementById("sidebar-toggle");
sidebarToggle.addEventListener("click", () => {
  sidebar.classList.toggle("collapsed");
  if (sidebar.classList.contains("collapsed")) {
    sidebarToggle.classList.remove("ti-layout-sidebar-left-collapse");
    sidebarToggle.classList.add("ti-layout-sidebar-left-expand");
  } else {
    sidebarToggle.classList.remove("ti-layout-sidebar-left-expand");
    sidebarToggle.classList.add("ti-layout-sidebar-left-collapse");
  }
});

// ====== DADOS MOCKADOS ======
const processo = {
  numero: "0001234-56.2025.8.21.0001",
  vara: "vara cível - 3ª vara",
  partes: "fulano da silva vs. empresa xyz ltda.",
  tarefa: {
    titulo: "protocolar manifestação",
    descricao: "elaborar e protocolar manifestação sobre decisão interlocutória",
    prazos: [
      { label: "solicitação", data: "18/06/2026" },
      { label: "revisão", data: "22/06/2026" }
    ]
  }
};

const eventos = [
  {
    tipo: "decisão interlocutória",
    data: "10/06/2026",
    descricao: "juiz determinou prazo de 15 dias para manifestação da parte autora sobre documentos juntados pela ré.",
    recente: true
  },
  {
    tipo: "juntada de documentos",
    data: "05/06/2026",
    descricao: "parte ré juntou documentos fiscais e contábeis referentes ao período questionado.",
    recente: true
  },
  {
    tipo: "despacho",
    data: "28/05/2026",
    descricao: "juiz deferiu pedido de produção de prova documental pela parte ré.",
    recente: false
  },
  {
    tipo: "petição inicial",
    data: "15/04/2026",
    descricao: "distribuição da ação e citação da parte ré para apresentar contestação.",
    recente: false
  }
];

// ====== RENDERIZAÇÃO ======

// Título
document.getElementById("proc-titulo").textContent = `processo ${processo.numero.split(".")[0]}`;
document.getElementById("proc-subtitulo").innerHTML =
  `<i class="ti ti-gavel" style="font-size:14px; vertical-align:-2px; margin-right:4px;"></i>${processo.vara} · ${processo.partes}`;

// Card de tarefa
const tarefaCard = document.getElementById("tarefa-card");
tarefaCard.innerHTML = `
  <div class="tarefa-prazos">
    ${processo.tarefa.prazos.map(p => `
      <div class="prazo-pill">
        <i class="ti ti-clock"></i>
        <span class="prazo-label">${p.label}:</span>
        <span class="prazo-date">${p.data}</span>
      </div>
    `).join("")}
  </div>
  <div class="tarefa-center">
    <div class="tarefa-titulo">${processo.tarefa.titulo}</div>
    <div class="tarefa-desc">${processo.tarefa.descricao}</div>
    <button class="btn-escrever" onclick="alert('Abrir editor de esboço')">
      <i class="ti ti-pencil"></i> escrever esboço
    </button>
  </div>
  <div class="tarefa-acoes">
    <button class="btn-acao btn-sim" title="confirmar tarefa" onclick="alert('Tarefa confirmada')">
      <i class="ti ti-check"></i>
    </button>
    <button class="btn-acao btn-nao" title="rejeitar tarefa" onclick="alert('Tarefa rejeitada')">
      <i class="ti ti-x"></i>
    </button>
  </div>
`;

// Timeline
const timeline = document.getElementById("timeline");
eventos.forEach(e => {
  const item = document.createElement("div");
  item.className = `timeline-item${e.recente ? "" : " old"}`;
  item.innerHTML = `
    <div class="evento-header">
      <span class="evento-tipo">${e.tipo}</span>
      <span class="evento-data">${e.data}</span>
    </div>
    <p class="evento-desc">${e.descricao}</p>
  `;
  timeline.appendChild(item);
});

// Botão "carregar mais"
const more = document.createElement("div");
more.className = "timeline-more";
more.textContent = "carregar eventos anteriores...";
more.addEventListener("click", () => alert("Carregar mais eventos"));
timeline.appendChild(more);
</script>
</body>
</html>
