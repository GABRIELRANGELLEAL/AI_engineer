<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel - Processos</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
  body { background: #F4EFE6; color: #3A3530; }

  .app { display: flex; min-height: 100vh; }

  .sidebar {
    width: 240px;
    background: #6B5B4D;
    display: flex;
    flex-direction: column;
    padding: 16px 12px;
    gap: 2px;
    flex-shrink: 0;
    transition: width .2s ease;
  }
  .sidebar.collapsed {
    width: 76px;
    align-items: center;
    padding: 16px 8px;
  }

  .sidebar-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 4px 8px; margin-bottom: 18px;
  }
  .sidebar.collapsed .sidebar-header { justify-content: center; padding: 4px 0; }
  .sidebar-header .brand { font-size: 15px; font-weight: 500; color: #F4EFE6; white-space: nowrap; }
  .sidebar.collapsed .sidebar-header .brand { display: none; }
  .sidebar-header .toggle-icon {
    font-size: 18px; color: #B4A89A; cursor: pointer; flex-shrink: 0;
    padding: 4px; border-radius: 6px; transition: background .15s, color .15s;
  }
  .sidebar-header .toggle-icon:hover { background: #5C4D40; color: #FFFFFF; }

  .workspace-pill {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px;
    border: 0.5px solid #7F6E5F; margin-bottom: 16px;
    cursor: pointer; transition: background .15s;
    white-space: nowrap; overflow: hidden;
  }
  .sidebar.collapsed .workspace-pill { padding: 8px; justify-content: center; border: none; margin-bottom: 14px; }
  .workspace-pill:hover { background: #5C4D40; }
  .workspace-pill .ws-icon {
    width: 24px; height: 24px; border-radius: 6px; background: #D4622A;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .workspace-pill .ws-icon i { font-size: 14px; color: #FAEEDA; }
  .workspace-pill .ws-name { font-size: 14px; font-weight: 500; color: #F4EFE6; flex: 1; }
  .workspace-pill .ws-chevron { font-size: 14px; color: #B4A89A; }
  .sidebar.collapsed .workspace-pill .ws-name,
  .sidebar.collapsed .workspace-pill .ws-chevron { display: none; }

  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 9px 10px; border-radius: 8px;
    color: #D8CFC2; cursor: pointer;
    transition: background .15s, color .15s;
    white-space: nowrap; overflow: hidden;
    font-size: 14px;
  }
  .sidebar.collapsed .nav-item { padding: 10px; justify-content: center; }
  .nav-item i { font-size: 19px; flex-shrink: 0; color: #B4A89A; }
  .sidebar.collapsed .nav-item span { display: none; }
  .nav-item:hover { background: #5C4D40; color: #FFFFFF; }
  .nav-item.active { background: #5C4D40; color: #F4EFE6; font-weight: 500; }
  .nav-item.active i { color: #D4622A; }

  .nav-spacer { flex: 1; }

  .sidebar-footer {
    border-top: 0.5px solid #7F6E5F;
    padding-top: 8px; margin-top: 8px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .sidebar.collapsed .sidebar-footer { width: 100%; align-items: center; }

  .footer-link {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; padding: 8px 10px; border-radius: 8px;
    color: #B4A89A; font-size: 13px; cursor: pointer;
    white-space: nowrap; overflow: hidden;
    transition: background .15s;
  }
  .sidebar.collapsed .footer-link { padding: 8px; justify-content: center; }
  .footer-link i:first-child { font-size: 17px; flex-shrink: 0; }
  .footer-link:hover { background: #5C4D40; color: #D8CFC2; }
  .sidebar.collapsed .footer-link span:not(:first-child) { display: none; }

  .user-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 10px; border-radius: 8px;
    cursor: pointer; transition: background .15s;
    white-space: nowrap; overflow: hidden; margin-top: 4px;
  }
  .sidebar.collapsed .user-row { padding: 10px; justify-content: center; }
  .user-row:hover { background: #5C4D40; }
  .user-row .avatar {
    width: 28px; height: 28px; border-radius: 50%; background: #D4622A;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    font-size: 12px; font-weight: 500; color: #FAEEDA;
  }
  .user-row .user-info { flex: 1; overflow: hidden; }
  .user-row .user-name { font-size: 13px; font-weight: 500; color: #F4EFE6; }
  .user-row .user-role { font-size: 12px; color: #B4A89A; }
  .user-row .user-chevron { font-size: 14px; color: #B4A89A; flex-shrink: 0; }
  .sidebar.collapsed .user-row .user-info,
  .sidebar.collapsed .user-row .user-chevron { display: none; }

  .main { flex: 1; padding: 24px 28px; display: flex; flex-direction: column; gap: 20px; max-width: 1100px; }

  h2 { font-size: 22px; font-weight: 500; }
  h3 { font-size: 16px; font-weight: 500; margin-bottom: 12px; }
  .subtitle { font-size: 14px; color: #8A8276; margin-top: 4px; }

  .card {
    background: #FFFFFF;
    border: 0.5px solid #E2D9CC;
    border-radius: 12px;
    padding: 16px 20px;
  }

  /* Calendário */
  .cal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; font-size: 14px; font-weight: 500;
  }
  .cal-header i { font-size: 16px; color: #D4622A; margin-right: 6px; vertical-align: -2px; }
  .cal-month { font-size: 12px; color: #8A8276; font-weight: 400; }

  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  .cal-grid .dow {
    font-size: 11px; color: #B4B2A9; text-align: center; padding: 4px 0;
  }
  .cal-day {
    height: 32px; border-radius: 8px; background: #F4EFE6;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; color: #8A8276; cursor: default;
  }
  .cal-day.empty { background: transparent; }
  .cal-day.prazo { background: #FAC775; color: #633806; font-weight: 500; }
  .cal-day.audiencia { background: #F0997B; color: #4A1B0C; font-weight: 500; }
  .cal-day:hover:not(.empty) { outline: 1px solid #D4622A; }

  .legend {
    display: flex; gap: 16px; margin-top: 12px; font-size: 12px; color: #8A8276;
  }
  .legend .dot {
    display: inline-block; width: 10px; height: 10px; border-radius: 3px;
    margin-right: 4px; vertical-align: -1px;
  }
  .dot.prazo { background: #FAC775; }
  .dot.audiencia { background: #F0997B; }

  /* Processos */
  .processos-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 14px;
  }
  .processo-card { cursor: pointer; transition: border-color .15s; }
  .processo-card:hover { border-color: #D4622A; }

  .processo-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .processo-numero { font-size: 15px; font-weight: 500; }
  .badge {
    font-size: 11px; padding: 2px 8px; border-radius: 8px; font-weight: 500;
  }
  .badge.pendente { background: #FAC775; color: #633806; }
  .badge.em-dia { background: #C0DD97; color: #27500A; }

  .processo-info {
    font-size: 13px; color: #8A8276; margin-bottom: 6px;
    display: flex; align-items: center; gap: 6px;
  }
  .processo-tarefa {
    font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 6px;
  }
  .processo-tarefa.urgente { color: #6B5B4D; }
  .processo-tarefa.urgente i { color: #D85A30; }
  .processo-tarefa.ok { color: #8A8276; }
</style>
</head>
<body>
<div class="app">

  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="brand">jurisapp</span>
      <i class="ti ti-layout-sidebar-left-collapse toggle-icon" id="sidebar-toggle"></i>
    </div>

    <div class="workspace-pill">
      <div class="ws-icon"><i class="ti ti-scale"></i></div>
      <span class="ws-name">escritório fulano</span>
      <i class="ti ti-chevron-down ws-chevron"></i>
    </div>

    <div class="nav-item active"><i class="ti ti-home"></i><span>início</span></div>
    <div class="nav-item"><i class="ti ti-files"></i><span>processos</span></div>
    <div class="nav-item"><i class="ti ti-calendar"></i><span>calendário</span></div>

    <div class="nav-spacer"></div>

    <div class="sidebar-footer">
      <div class="nav-item"><i class="ti ti-settings"></i><span>configurações</span></div>
      <div class="footer-link"><i class="ti ti-help"></i><span>ajuda</span></div>
      <div class="user-row">
        <div class="avatar">DF</div>
        <div class="user-info">
          <div class="user-name">dr. fulano</div>
          <div class="user-role">admin · escritório fulano</div>
        </div>
        <i class="ti ti-chevron-down user-chevron"></i>
      </div>
    </div>
  </div>

  <!-- Conteúdo principal -->
  <div class="main">

    <div>
      <h2 id="greeting">olá, dr. fulano</h2>
      <p class="subtitle">acompanhe seus processos e prazos</p>
    </div>

    <!-- Calendário -->
    <div class="card">
      <div class="cal-header">
        <span><i class="ti ti-calendar"></i>calendário de atividades</span>
        <span class="cal-month" id="cal-month"></span>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
      <div class="legend">
        <span><span class="dot prazo"></span>prazo próximo</span>
        <span><span class="dot audiencia"></span>audiência</span>
      </div>
    </div>

    <!-- Processos -->
    <div>
      <h3>seus processos</h3>
      <div class="processos-grid" id="processos-grid"></div>
    </div>

  </div>
</div>

<script>
// Sidebar retrátil
const sidebar = document.getElementById("sidebar");
const sidebarToggle = document.getElementById("sidebar-toggle");

sidebarToggle.addEventListener("click", () => {
  sidebar.classList.toggle("collapsed");
  if (sidebar.classList.contains("collapsed")) {
    sidebarToggle.classList.remove("ti-layout-sidebar-left-collapse");
    sidebarToggle.classList.add("ti-layout-sidebar-left-expand");
  } else {
    sidebarToggle.classList.remove("ti-layout-sidebar-left-expand");
    sidebarToggle.classList.add("ti-layout-sidebar-left-collapse");
  }
});

// ====== DADOS MOCKADOS ======
const usuario = {
  nome: "fulano"
};

const eventosCalendario = {
  5: "prazo",
  10: "audiencia",
  18: "prazo"
};

const processos = [
  {
    numero: "0001234-56.2025.8.21.0001",
    status: "pendente",
    vara: "vara cível - 3ª vara",
    tarefa: "protocolar manifestação até 18/06",
    urgente: true
  },
  {
    numero: "0007890-12.2025.5.04.0001",
    status: "em-dia",
    vara: "vara trabalhista - 1ª vara",
    tarefa: "audiência agendada para 25/06",
    urgente: false
  },
  {
    numero: "0004567-89.2024.8.21.0010",
    status: "pendente",
    vara: "vara cível - 10ª vara",
    tarefa: "elaborar recurso até 22/06",
    urgente: true
  },
  {
    numero: "0002345-67.2025.8.21.0003",
    status: "em-dia",
    vara: "vara de família - 3ª vara",
    tarefa: "aguardando decisão judicial",
    urgente: false
  }
];

// ====== RENDERIZAÇÃO ======

// Saudação
document.getElementById("greeting").textContent = `olá, dr. ${usuario.nome}`;

// Calendário (mock: junho/2026, começa numa quarta-feira)
const mesNome = "junho 2026";
const diasNoMes = 30;
const primeiroDiaSemana = 1; // 0=dom ... 6=sab. junho/2026 começa numa segunda

document.getElementById("cal-month").textContent = mesNome;

const calGrid = document.getElementById("cal-grid");
const diasSemana = ["D", "S", "T", "Q", "Q", "S", "S"];

diasSemana.forEach(d => {
  const el = document.createElement("div");
  el.className = "dow";
  el.textContent = d;
  calGrid.appendChild(el);
});

// espaços vazios antes do dia 1
for (let i = 0; i < primeiroDiaSemana; i++) {
  const el = document.createElement("div");
  el.className = "cal-day empty";
  calGrid.appendChild(el);
}

// dias do mês
for (let dia = 1; dia <= diasNoMes; dia++) {
  const el = document.createElement("div");
  el.className = "cal-day";
  el.textContent = dia;

  if (eventosCalendario[dia] === "prazo") {
    el.classList.add("prazo");
    el.title = "prazo próximo";
  } else if (eventosCalendario[dia] === "audiencia") {
    el.classList.add("audiencia");
    el.title = "audiência";
  }

  calGrid.appendChild(el);
}

// Processos
const processosGrid = document.getElementById("processos-grid");

processos.forEach(p => {
  const card = document.createElement("div");
  card.className = "card processo-card";

  const badgeLabel = p.status === "pendente" ? "pendente" : "em dia";
  const badgeClass = p.status === "pendente" ? "pendente" : "em-dia";
  const tarefaClass = p.urgente ? "urgente" : "ok";
  const tarefaIcon = p.urgente ? "ti-alert-circle" : "ti-calendar-event";

  card.innerHTML = `
    <div class="processo-header">
      <span class="processo-numero">${p.numero.split(".")[0]}</span>
      <span class="badge ${badgeClass}">${badgeLabel}</span>
    </div>
    <div class="processo-info">
      <i class="ti ti-gavel"></i>${p.vara}
    </div>
    <div class="processo-tarefa ${tarefaClass}">
      <i class="ti ${tarefaIcon}"></i>${p.tarefa}
    </div>
  `;

  card.addEventListener("click", () => {
    alert(`Abrir processo: ${p.numero}`);
  });

  processosGrid.appendChild(card);
});
</script>
</body>
</html>
