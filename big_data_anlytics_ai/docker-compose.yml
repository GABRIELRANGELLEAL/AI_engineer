# Full stack: Postgres + FastAPI + Vite frontend (dev)
#
# WSL: run from a Linux path (e.g. ~/projects/...) not /mnt/c/... for speed.
#   docker compose up --build
#   UI:  http://localhost:3000
#   API: http://localhost:8000/docs
#
# Production-like static frontend (optional):
#   docker compose --profile prod up --build

services:
  db:
    image: postgres:16
    container_name: ts-agent-db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: analytics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d analytics"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ts-agent-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Inside Docker network the DB host is the service name "db", not localhost
      DATABASE_URL: postgresql://app:app@db:5432/analytics
      PYTHONUNBUFFERED: "1"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - ./workspace:/app/workspace
    working_dir: /app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  frontend:
    image: node:20-alpine
    container_name: ts-agent-frontend
    working_dir: /app/frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
    volumes:
      - ./frontend:/app/frontend
      # Keep container node_modules separate from host (WSL/Windows mix-safe)
      - frontend_node_modules:/app/frontend/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    depends_on:
      api:
        condition: service_healthy

  # Optional: nginx serving built React app + /api proxy (closer to production)
  frontend-prod:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ts-agent-frontend-prod
    ports:
      - "3000:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  pgdata:
  frontend_node_modules:
